<svg
  width="128"
  height="128"
  viewBox="0 0 128 128"
  xmlns="http://www.w3.org/2000/svg"
>
  <!-- Background with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
  </defs>

  <!-- Rounded square -->
  <rect
    x="8"
    y="8"
    width="112"
    height="112"
    rx="28"
    fill="url(#bgGradient)"
  />

  <!-- Outer circle -->
  <circle
    cx="64"
    cy="64"
    r="30"
    fill="none"
    stroke="white"
    stroke-width="4"
  />

  <!-- Play triangle -->
  <polygon
    points="58,52 58,76 76,64"
    fill="white"
  />
</svg>
